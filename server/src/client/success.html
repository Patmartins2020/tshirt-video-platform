<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Successful</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 30px;
    }

    .box {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 28px;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #111827;
      font-size: 34px;
    }

    p {
      color: #4b5563;
      line-height: 1.6;
      font-size: 17px;
    }

    .success {
      color: #16a34a;
      font-weight: bold;
      margin-bottom: 15px;
      font-size: 18px;
    }

    .card {
      background: #f8fafc;
      border-radius: 10px;
      padding: 16px;
      margin-top: 18px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      cursor: pointer;
      margin-top: 14px;
      background: black;
      color: white;
    }

    .btn.secondary {
      background: #ddd;
      color: #111;
    }
  </style>
  <link rel="stylesheet" href="theme.css">
</head>
<body>
  <div class="box" id="successBox">
    <p>Loading order confirmation...</p>
  </div>

  <script>
    function loadSuccessPage() {
      const raw = localStorage.getItem("latestOrder");
      const order = raw ? JSON.parse(raw) : null;

      if (!order) {
        document.getElementById("successBox").innerHTML = `
          <h1>Order Confirmation</h1>
          <p>No recent order was found.</p>
          <button class="btn" onclick="window.location.href='shop.html'">Back to Shop</button>
        `;
        return;
      }

      document.getElementById("successBox").innerHTML = `
        <div class="success">✅ Test Payment Successful</div>
        <h1>Thank you for your order</h1>
        <p>Your test order has been created successfully.</p>

        <div class="card">
          <p><strong>Order Number:</strong> ${order.orderNumber}</p>
          <p><strong>Name:</strong> ${order.fullName}</p>
          <p><strong>Email:</strong> ${order.email}</p>
          <p><strong>Phone:</strong> ${order.phone}</p>
          <p><strong>Address:</strong> ${order.address}</p>
          <p><strong>Total Paid:</strong> $${order.total}</p>
          <p><strong>Payment Method:</strong> ${order.paymentMethod}</p>
          <p><strong>Status:</strong> ${order.paymentStatus}</p>
        </div>

        <button class="btn" onclick="window.location.href='shop.html'">Continue Shopping</button>
        <button class="btn secondary" onclick="window.location.href='dashboard.html'">Go to Dashboard</button>
      `;
    }

    loadSuccessPage();
  </script>
</body>
</html>
