<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Seller Dashboard</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f4f6f9;
}

.dashboard{
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:#111827;
  color:#fff;
  padding:25px 18px;
}

.logo{
  font-size:26px;
  font-weight:bold;
  margin-bottom:30px;
}

.user-box{
  background:#1f2937;
  padding:14px;
  border-radius:10px;
  margin-bottom:25px;
}

.user-box small{
  color:#bbb;
}

.user-box strong{
  display:block;
  margin-top:6px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.menu button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:#fff;
  text-align:left;
  cursor:pointer;
  font-size:15px;
}

.menu button:hover{
  background:#374151;
}

.logout-btn{
  background:#dc2626 !important;
  margin-top:15px;
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:15px;
  margin-bottom:25px;
}

.topbar h1{
  font-size:34px;
}

.quick-btn{
  padding:12px 18px;
  border:none;
  border-radius:8px;
  background:#111827;
  color:white;
  cursor:pointer;
}

.quick-btn:hover{
  background:#000;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  margin-bottom:25px;
}

.stat-card{
  background:white;
  padding:18px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.06);
}

.stat-card h3{
  font-size:14px;
  color:#666;
}

.num{
  font-size:30px;
  font-weight:bold;
  margin-top:8px;
}

/* SECTION */
.section{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.06);
}

.section h2{
  margin-bottom:18px;
}

/* GRID */
#designList{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
  gap:20px;
}

/* CARD */
.design-card{
  border:1px solid #eee;
  border-radius:14px;
  padding:14px;
  background:white;
}

/* MOCKUP */
.mockup-box{
  position:relative;
  width:100%;
  height:280px;
  background:#f9fafb;
  border-radius:12px;
  overflow:hidden;
}

.mockup-base{
  width:100%;
  height:100%;
  object-fit:contain;
}

.design-print{
  position:absolute;
  top:36%;
  left:50%;
  transform:translate(-50%,-50%);
  width:95px;
  height:95px;
  object-fit:contain;
}

/* CONTENT */
.design-card h3{
  margin-top:14px;
  font-size:20px;
}

.design-card p{
  color:#666;
  font-size:14px;
  margin-top:6px;
}

.design-card strong{
  display:block;
  margin-top:10px;
  font-size:20px;
}

/* ACTIONS */
.card-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:14px;
}

.card-actions button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  color:white;
}

.view-btn{background:#2563eb;}
.del-btn{background:#dc2626;}
.promote-btn{background:#9333ea;}
.publish-btn{background:#16a34a;}

.view-btn:hover,
.del-btn:hover,
.promote-btn:hover,
.publish-btn:hover{
  opacity:.9;
}

.empty{
  color:#666;
}

/* MOBILE */
@media(max-width:900px){

.dashboard{
  flex-direction:column;
}

.sidebar{
  width:100%;
}

.main{
  padding:18px;
}

.topbar h1{
  font-size:28px;
}

}
</style>
</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<aside class="sidebar">

<div class="logo">TeePlatform</div>

<div class="user-box">
<small>Logged in as</small>
<strong id="sidebarUser">User</strong>
</div>

<div class="menu">
<button onclick="goPage('dashboard.html')">🏠 Home</button>
<button onclick="goPage('my-orders.html')">📦 My Orders</button>
<button onclick="goPage('dashboard.html')">🎨 My Designs</button>
<button onclick="goPage('cart.html')">🛒 Cart</button>
<button onclick="goPage('profile.html')">👤 Profile</button>
<button class="logout-btn" onclick="logout()">🚪 Logout</button>
</div>

</aside>

<!-- MAIN -->
<main class="main">

<div class="topbar">
<h1 id="welcomeText">Welcome</h1>

<button class="quick-btn" onclick="goPage('upload-design.html')">
+ Upload Design
</button>
</div>

<!-- STATS -->
<div class="stats">

<div class="stat-card">
<h3>Total Designs</h3>
<div class="num" id="designCount">0</div>
</div>

<div class="stat-card">
<h3>My Orders</h3>
<div class="num" id="orderCount">0</div>
</div>

<div class="stat-card">
<h3>Cart Items</h3>
<div class="num" id="cartCount">0</div>
</div>

</div>

<!-- PRODUCTS -->
<div class="section">
<h2>My Uploaded Products</h2>
<div id="designList"></div>
</div>

</main>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));
const token = localStorage.getItem("token");
const designList = document.getElementById("designList");

if(!token || !user){
  alert("Please login first");
  window.location.href = "login.html";
}

const userName = user.fullName || user.name || "User";

document.getElementById("welcomeText").innerText =
"Welcome, " + userName;

document.getElementById("sidebarUser").innerText =
userName;

/* COUNTS */
function loadCounts(){

const allOrders =
JSON.parse(localStorage.getItem("allOrders")) || [];

const userOrders =
allOrders.filter(order => order.email === user.email);

document.getElementById("orderCount").innerText =
userOrders.length;

const cart =
JSON.parse(localStorage.getItem("cart")) || [];

document.getElementById("cartCount").innerText =
cart.length;
}

/* IMAGE PATH */
function getImagePath(imageUrl){

if(!imageUrl || imageUrl.trim() === ""){
return "http://localhost:5000/uploads/shirts.jpg";
}

if(imageUrl.startsWith("uploads/")){
return `http://localhost:5000/${imageUrl}`;
}

return `http://localhost:5000/uploads/${imageUrl}`;
}

/* LOAD PRODUCTS */
async function loadDesigns(){

try{

const res = await fetch(
`http://localhost:5000/api/designs/my-designs/${user.id}`
);

const result = await res.json();

if(!result.success){
designList.innerHTML =
"<p class='empty'>Failed to load products.</p>";
return;
}

const designs = result.designs || [];

document.getElementById("designCount").innerText =
designs.length;

if(designs.length === 0){
designList.innerHTML =
"<p class='empty'>No products uploaded yet.</p>";
return;
}

let cards = "";

designs.forEach(design=>{

cards += `
<div class="design-card">

<div class="mockup-box">

<img class="mockup-base"
src="./assets/mockups/tshirt-white.png">

<img class="design-print"
src="${getImagePath(design.imageUrl)}"
onerror="this.src='http://localhost:5000/uploads/shirts.jpg'">

</div>

<h3>${design.title}</h3>

<p>${design.description || "No description"}</p>

<strong>$${design.price || 0}</strong>

<div class="card-actions">

<button class="view-btn"
onclick="viewProduct(${design.id})">
View
</button>

<button class="publish-btn"
onclick="publishSoon()">
Publish
</button>

<button class="del-btn"
onclick="deleteProduct(${design.id})">
Delete
</button>

<button class="promote-btn"
onclick="createPromoVideo(
  ${design.id},
  '${String(design.title).replace(/'/g, "\\'")}',
  '${String(getImagePath(design.imageUrl)).replace(/'/g, "\\'")}',
  '${design.price || 0}'
)">
Create Video
</button>
</div>

</div>
`;
});

designList.innerHTML = cards;

}catch(error){

console.log(error);

designList.innerHTML =
"<p class='empty'>Failed to load products.</p>";
}
}

/* DELETE */
async function deleteProduct(id){

const ask =
confirm("Delete this product permanently?");

if(!ask) return;

try{

const res = await fetch(
`http://localhost:5000/api/designs/delete/${id}`,
{
method:"DELETE"
});

const data = await res.json();

if(data.success){
alert("Product deleted successfully");
loadDesigns();
}else{
alert(data.message || "Delete failed");
}

}catch(error){
alert("Server error");
}
}

/* PLACEHOLDERS */
function publishSoon(){
alert("Publishing system coming next.");
}

function promoteSoon(){
alert("Promotion feature coming soon.");
}

function createPromoVideo(id, title, imageUrl, price){
  const url =
    `create-video.html?id=${id}` +
    `&title=${encodeURIComponent(title)}` +
    `&image=${encodeURIComponent(imageUrl)}` +
    `&price=${encodeURIComponent(price)}`;

  window.location.href = url;
}

/* MENU */
function viewProduct(id){
window.location.href =
`product.html?id=${id}`;
}

function goPage(page){
window.location.href = page;
}

function logout(){

localStorage.removeItem("token");
localStorage.removeItem("user");

window.location.href = "login.html";
}

/* INIT */
loadCounts();
loadDesigns();

</script>

</body>
</html>
