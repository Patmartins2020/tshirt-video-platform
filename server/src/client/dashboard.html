<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background: #f8f9fa;
      margin: 0;
    }

    h1, h2 {
      color: #222;
    }

    #designList {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .design-card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s ease;
    }

    .design-card:hover {
      transform: translateY(-3px);
    }

    .design-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 8px;
      background: #eee;
      display: block;
    }

    .design-card h3 {
      margin: 12px 0 6px;
      font-size: 20px;
    }

    .design-card p {
      color: #555;
      font-size: 14px;
      margin: 0;
    }

    .design-card strong {
      display: block;
      margin-top: 12px;
      color: #111;
      font-size: 18px;
    }

    .dashboard-actions {
      margin-top: 30px;
      display: flex;
      gap: 15px;
      position: relative;
      z-index: 10;
    }

    button {
      padding: 12px 20px;
      border: none;
      background: #111;
      color: white;
      cursor: pointer;
      border-radius: 6px;
      font-size: 15px;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <h1 id="welcomeText">Welcome</h1>
  <h2>My Uploaded Designs</h2>
  <div id="designList"></div>

  <div class="dashboard-actions">
    <button type="button" onclick="goToUpload()">Upload Design</button>
    <button type="button" id="logoutBtn">Logout</button>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    const token = localStorage.getItem("token");
    const designList = document.getElementById("designList");

    if (!token || !user) {
      alert("Please login first");
      window.location.href = "./login.html";
    }

    document.getElementById("welcomeText").innerText =
      "Welcome, " + (user.fullName || user.name || "User");

    function getImagePath(imageUrl) {
      if (!imageUrl || imageUrl.trim() === "") {
        return "http://localhost:5000/uploads/shirts.jpg";
      }

      if (imageUrl.startsWith("uploads/")) {
        return `http://localhost:5000/${imageUrl}`;
      }

      return `http://localhost:5000/uploads/${imageUrl}`;
    }

    async function loadDesigns() {
      try {
        if (!user || !user.id) {
          designList.innerHTML = "<p>User not found.</p>";
          return;
        }

        const response = await fetch(
          `http://localhost:5000/api/designs/my-designs/${user.id}`
        );

        const result = await response.json();

        if (!result.success) {
          designList.innerHTML = "<p>Failed to load designs.</p>";
          return;
        }

        const designs = result.designs;

        if (!designs || designs.length === 0) {
          designList.innerHTML = "<p>No designs uploaded yet.</p>";
          return;
        }

        let cards = "";

        designs.forEach((design) => {
          const imagePath = getImagePath(design.imageUrl);

          cards += `
            <div class="design-card">
              <img
                src="${imagePath}"
                alt="${design.title}"
                onerror="this.src='http://localhost:5000/uploads/shirts.jpg'"
              />
              <h3>${design.title}</h3>
              <p>${design.description || "No description"}</p>
              <strong>$${design.price || 0}</strong>
            </div>
          `;
        });

        designList.innerHTML = cards;

      } catch (error) {
        console.error("LOAD DESIGNS ERROR:", error);
        designList.innerHTML = "<p>Failed to load designs.</p>";
      }
    }

    loadDesigns();

    function goToUpload() {
      window.location.href = "./upload-design.html";
    }

    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      alert("Logged out successfully");
      window.location.href = "./login.html";
    });
  </script>
</body>
</html>
