<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Profile</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f4f6f9;
}

header{
  background:#111;
  color:#fff;
  padding:18px 22px;
  font-size:28px;
  font-weight:bold;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:25px;
}

.layout{
  display:grid;
  grid-template-columns:340px 1fr;
  gap:22px;
}

.card{
  background:#fff;
  border-radius:14px;
  padding:22px;
  box-shadow:0 3px 10px rgba(0,0,0,.06);
}

.profile-top{
  text-align:center;
}

.avatar-wrap{
  position:relative;
  width:130px;
  height:130px;
  margin:0 auto 15px;
}

.avatar{
  width:130px;
  height:130px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #eee;
  background:#ddd;
}

.upload-btn{
  position:absolute;
  right:0;
  bottom:0;
  width:38px;
  height:38px;
  border:none;
  border-radius:50%;
  background:#111;
  color:#fff;
  cursor:pointer;
  font-size:18px;
}

.name{
  font-size:24px;
  font-weight:bold;
  color:#111;
}

.small{
  color:#666;
  margin-top:6px;
  font-size:14px;
}

.badge{
  display:inline-block;
  margin-top:10px;
  background:#eef2ff;
  color:#4338ca;
  padding:7px 12px;
  border-radius:999px;
  font-size:13px;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:20px;
}

.stat{
  background:#f8f9fc;
  border-radius:10px;
  padding:15px;
  text-align:center;
}

.stat h3{
  font-size:13px;
  color:#666;
}

.stat .num{
  margin-top:8px;
  font-size:24px;
  font-weight:bold;
  color:#111;
}

.section-title{
  font-size:22px;
  margin-bottom:18px;
  color:#111;
}

.row{
  margin-bottom:15px;
}

label{
  display:block;
  margin-bottom:6px;
  font-weight:bold;
  color:#333;
}

input, textarea{
  width:100%;
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:15px;
}

textarea{
  resize:vertical;
  min-height:90px;
}

.btn{
  padding:12px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

.dark{
  background:#111;
  color:#fff;
}

.gray{
  background:#ddd;
  color:#111;
}

.btn-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:15px;
}

.preview-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  margin-top:20px;
}

.preview-card{
  border:1px solid #eee;
  border-radius:12px;
  padding:12px;
}

.preview-card img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:10px;
  background:#eee;
}

.preview-card p{
  margin-top:10px;
  font-size:14px;
  color:#444;
}

@media(max-width:900px){
  .layout{
    grid-template-columns:1fr;
  }
}
</style>
<link rel="stylesheet" href="theme.css">
</head>

<body>

<header>My Profile</header>

<div class="container">

<div class="layout">

  <!-- LEFT PROFILE CARD -->
  <div class="card">

    <div class="profile-top">

      <div class="avatar-wrap">
        <img id="avatarImage" class="avatar" src="https://via.placeholder.com/200?text=User">
        <button class="upload-btn" onclick="document.getElementById('avatarInput').click()">+</button>
      </div>

      <input type="file" id="avatarInput" accept="image/*" style="display:none">

      <div class="name" id="userName">User</div>
      <div class="small" id="userEmail">email@email.com</div>

      <div class="badge" id="planBadge">Free Plan</div>

    </div>

    <div class="stats">
      <div class="stat">
        <h3>Orders</h3>
        <div class="num" id="orderCount">0</div>
      </div>

      <div class="stat">
        <h3>Designs</h3>
        <div class="num" id="designCount">0</div>
      </div>
    </div>

    <div class="btn-row" style="margin-top:20px;">
      <button class="btn dark" onclick="goDashboard()">Dashboard</button>
      <button class="btn gray" onclick="logout()">Logout</button>
    </div>

  </div>

  <!-- RIGHT SETTINGS -->
  <div class="card">

    <div class="section-title">Profile Settings</div>

    <div class="row">
      <label>Full Name</label>
      <input type="text" id="fullNameInput">
    </div>

    <div class="row">
      <label>Email</label>
      <input type="email" id="emailInput">
    </div>

    <div class="row">
      <label>Phone</label>
      <input type="text" id="phoneInput" placeholder="+39...">
    </div>

    <div class="row">
      <label>Address</label>
      <textarea id="addressInput"></textarea>
    </div>

    <div class="btn-row">
      <button class="btn dark" onclick="saveProfile()">Save Changes</button>
      <button class="btn gray" onclick="goOrders()">My Orders</button>
    </div>

    <div class="section-title" style="margin-top:28px;">Latest Product Preview</div>

    <div id="productPreview"></div>

  </div>

</div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user")) || {};
const token = localStorage.getItem("token");

if(!token){
  window.location.href = "login.html";
}

/* LOAD BASIC USER */
document.getElementById("userName").textContent =
  user.fullName || user.name || "User";

document.getElementById("userEmail").textContent =
  user.email || "No email";

document.getElementById("fullNameInput").value =
  user.fullName || user.name || "";

document.getElementById("emailInput").value =
  user.email || "";

/* LOAD SAVED PROFILE DETAILS */
const profile = JSON.parse(localStorage.getItem("profileDetails")) || {};

document.getElementById("phoneInput").value =
  profile.phone || "";

document.getElementById("addressInput").value =
  profile.address || "";

/* PLAN */
document.getElementById("planBadge").textContent =
  user.plan || "Free Plan";

/* COUNTS */
function loadCounts(){

  const allOrders =
    JSON.parse(localStorage.getItem("allOrders")) || [];

  const myOrders =
    allOrders.filter(order =>
      order.email === user.email
    );

  document.getElementById("orderCount").textContent =
    myOrders.length;

  fetch(`http://localhost:5000/api/designs/my-designs/${user.id}`)
  .then(res => res.json())
  .then(data => {
    const designs = data.designs || [];
    document.getElementById("designCount").textContent =
      designs.length;
  })
  .catch(() => {
    document.getElementById("designCount").textContent = "0";
  });
}

/* SAVE PROFILE */
function saveProfile(){

  const updatedName =
    document.getElementById("fullNameInput").value.trim();

  const updatedEmail =
    document.getElementById("emailInput").value.trim();

  const phone =
    document.getElementById("phoneInput").value.trim();

  const address =
    document.getElementById("addressInput").value.trim();

  user.fullName = updatedName;
  user.email = updatedEmail;

  localStorage.setItem("user", JSON.stringify(user));

  localStorage.setItem("profileDetails", JSON.stringify({
    phone,
    address
  }));

  alert("Profile updated successfully.");

  location.reload();
}

/* AVATAR */
const savedAvatar = localStorage.getItem("profileAvatar");
if(savedAvatar){
  document.getElementById("avatarImage").src = savedAvatar;
}

document.getElementById("avatarInput")
.addEventListener("change", function(){

  const file = this.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    localStorage.setItem("profileAvatar", e.target.result);
    document.getElementById("avatarImage").src =
      e.target.result;
  };

  reader.readAsDataURL(file);
});

/* PRODUCT PREVIEW */
function loadLatestProduct(){

  const latest =
    JSON.parse(localStorage.getItem("latestOrder"));

  if(!latest){
    document.getElementById("productPreview").innerHTML =
      "<p>No recent product yet.</p>";
    return;
  }

  document.getElementById("productPreview").innerHTML = `
    <div class="preview-grid">
      <div class="preview-card">
        <img src="http://localhost:5000/uploads/shirts.jpg">
        <p><strong>${latest.productTitle || "Purchased Item"}</strong></p>
        <p>Total Paid: $${latest.total || 0}</p>
      </div>
    </div>
  `;
}

/* NAVIGATION */
function goDashboard(){
  window.location.href = "dashboard.html";
}

function goOrders(){
  window.location.href = "my-orders.html";
}

function logout(){

  localStorage.removeItem("token");
  localStorage.removeItem("user");

  window.location.href = "login.html";
}

/* INIT */
loadCounts();
loadLatestProduct();
</script>

</body>
</html>
