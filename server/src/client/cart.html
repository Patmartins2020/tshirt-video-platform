<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cart</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f4f6f9;
}

header{
  background:#111;
  color:#fff;
  padding:18px 22px;
  font-size:28px;
  font-weight:bold;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:25px;
}

.top-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.top-row h2{
  color:#111;
}

.btn{
  padding:12px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

.dark{
  background:#111;
  color:#fff;
}

.gray{
  background:#ddd;
  color:#111;
}

.cart-layout{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

.cart-items{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.cart-card{
  background:#fff;
  border-radius:14px;
  padding:18px;
  box-shadow:0 3px 10px rgba(0,0,0,.06);
  display:flex;
  gap:16px;
}

.cart-card img{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:12px;
  background:#eee;
}

.cart-info{
  flex:1;
}

.cart-info h3{
  margin-bottom:8px;
  color:#111;
}

.cart-info p{
  margin:4px 0;
  color:#666;
  font-size:14px;
}

.price{
  font-size:20px;
  font-weight:bold;
  color:#111;
  margin-top:10px;
}

.qty-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:12px;
  flex-wrap:wrap;
}

.qty-row input{
  width:70px;
  padding:8px;
  border:1px solid #ccc;
  border-radius:8px;
}

.summary{
  background:#fff;
  border-radius:14px;
  padding:20px;
  box-shadow:0 3px 10px rgba(0,0,0,.06);
  height:fit-content;
}

.summary h3{
  margin-bottom:16px;
}

.line{
  display:flex;
  justify-content:space-between;
  margin-bottom:12px;
  color:#555;
}

.total{
  font-size:22px;
  font-weight:bold;
  color:#111;
  margin-top:10px;
}

.empty{
  background:#fff;
  padding:35px;
  border-radius:14px;
  text-align:center;
  color:#666;
}

@media(max-width:900px){

  .cart-layout{
    grid-template-columns:1fr;
  }

  .cart-card{
    flex-direction:column;
  }

  .cart-card img{
    width:100%;
    height:220px;
  }
}
</style>
<link rel="stylesheet" href="theme.css">
</head>

<body>

<header>My Cart</header>

<div class="container">

<div class="top-row">
  <h2>Your Shopping Cart</h2>

  <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <button class="btn gray" onclick="goShop()">Continue Shopping</button>
    <button class="btn dark" onclick="clearCart()">Clear Cart</button>
  </div>
</div>

<div id="cartArea"></div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* fallback image */
function getImagePath(imageUrl){

  if(!imageUrl || imageUrl.trim() === ""){
    return "http://localhost:5000/uploads/shirts.jpg";
  }

  if(imageUrl.startsWith("http")){
    return imageUrl;
  }

  return "http://localhost:5000/uploads/" + imageUrl;
}

/* render cart */
function renderCart(){

  const cartArea = document.getElementById("cartArea");

  if(cart.length === 0){
    cartArea.innerHTML = `
      <div class="empty">
        <h2>Your cart is empty</h2>
        <br>
        <button class="btn dark" onclick="goShop()">Start Shopping</button>
      </div>
    `;
    return;
  }

  let itemsHTML = "";
  let subtotal = 0;

  cart.forEach((item,index)=>{

    const qty = Number(item.qty || 1);
    const price = Number(item.price || 0);
    const total = qty * price;

    subtotal += total;

    itemsHTML += `
      <div class="cart-card">

        <img
          src="${getImagePath(item.imageUrl)}"
          onerror="this.src='http://localhost:5000/uploads/shirts.jpg'"
        >

        <div class="cart-info">

          <h3>${item.title || "Product"}</h3>

          <p>Type: ${item.type || "T-Shirt"}</p>
          <p>Size: ${item.size || "-"}</p>
          <p>Color: ${item.color || "-"}</p>

          <div class="price">$${price}</div>

          <div class="qty-row">
            Qty:
            <input
              type="number"
              min="1"
              value="${qty}"
              onchange="updateQty(${index}, this.value)"
            >

            <button class="btn gray"
              onclick="removeItem(${index})">
              Remove
            </button>
          </div>

        </div>

      </div>
    `;
  });

  const shipping = subtotal > 0 ? 5 : 0;
  const grandTotal = subtotal + shipping;

  cartArea.innerHTML = `
    <div class="cart-layout">

      <div class="cart-items">
        ${itemsHTML}
      </div>

      <div class="summary">

        <h3>Order Summary</h3>

        <div class="line">
          <span>Items</span>
          <span>$${subtotal}</span>
        </div>

        <div class="line">
          <span>Shipping</span>
          <span>$${shipping}</span>
        </div>

        <hr style="margin:12px 0;">

        <div class="line total">
          <span>Total</span>
          <span>$${grandTotal}</span>
        </div>

        <button class="btn dark"
          style="width:100%; margin-top:18px;"
          onclick="checkoutCart(${grandTotal})">
          Proceed to Checkout
        </button>

      </div>

    </div>
  `;
}

/* update quantity */
function updateQty(index,value){

  const qty = Number(value);

  if(qty < 1) return;

  cart[index].qty = qty;

  localStorage.setItem("cart", JSON.stringify(cart));

  renderCart();
}

/* remove item */
function removeItem(index){

  cart.splice(index,1);

  localStorage.setItem("cart", JSON.stringify(cart));

  renderCart();
}

/* clear */
function clearCart(){

  if(!confirm("Clear all cart items?")) return;

  localStorage.removeItem("cart");
  cart = [];

  renderCart();
}

/* checkout */
function checkoutCart(total){

  localStorage.setItem("cartCheckoutTotal", total);

  window.location.href = "checkout.html";
}

/* shop */
function goShop(){
  window.location.href = "shop.html";
}

renderCart();
</script>

</body>
</html>
