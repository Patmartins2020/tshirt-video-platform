<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Orders</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f4f6f9;
}

/* HEADER */
header{
  background:#111827;
  color:white;
  padding:18px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

header h1{
  font-size:28px;
}

nav{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

nav button{
  padding:10px 16px;
  border:none;
  border-radius:6px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

nav button:hover{
  opacity:.9;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:30px 20px;
}

.top-box{
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
  margin-bottom:25px;
}

.top-box h2{
  font-size:34px;
  margin-bottom:10px;
}

.top-box p{
  color:#666;
  margin-bottom:15px;
}

.search-box{
  width:100%;
  padding:14px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:16px;
}

/* ORDERS */
#ordersList{
  display:grid;
  gap:20px;
}

.order-card{
  background:white;
  border-radius:14px;
  padding:22px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.order-top{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:18px;
}

.order-id{
  font-size:24px;
  font-weight:bold;
}

.order-date{
  color:#777;
}

.order-body{
  display:grid;
  grid-template-columns:140px 1fr;
  gap:20px;
  align-items:center;
}

.order-body img{
  width:130px;
  height:130px;
  object-fit:cover;
  border-radius:10px;
  background:#eee;
}

.product-title{
  font-size:28px;
  font-weight:bold;
  margin-bottom:10px;
}

.details p{
  margin:6px 0;
  color:#444;
}

/* PROGRESS */
.progress-wrap{
  margin-top:18px;
}

.progress{
  height:12px;
  background:#e5e7eb;
  border-radius:20px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  width:60%;
  background:#2563eb;
}

.status{
  margin-top:10px;
  font-weight:bold;
  color:#111;
}

.empty{
  background:white;
  padding:25px;
  border-radius:12px;
  text-align:center;
  color:#777;
}

@media(max-width:700px){

.order-body{
  grid-template-columns:1fr;
}

.order-body img{
  width:100%;
  height:220px;
}

.top-box h2{
  font-size:28px;
}

.product-title{
  font-size:22px;
}

header{
  gap:15px;
}
}
</style>
<link rel="stylesheet" href="theme.css">
</head>

<body>

<header>
<h1>My Orders</h1>

<nav>
<button onclick="goPage('dashboard.html')">Home</button>
<button onclick="goPage('shop.html')">Shop</button>
<button onclick="goPage('profile.html')">Profile</button>
<button onclick="goPage('cart.html')">Cart</button>
</nav>
</header>

<div class="container">

<div class="top-box">
<h2>Your Purchases</h2>
<p>Track all your purchases and delivery progress.</p>

<input
type="text"
class="search-box"
id="searchInput"
placeholder="Search by product name..."
onkeyup="filterOrders()"
/>
</div>

<div id="ordersList"></div>

</div>

<script>
const ordersList = document.getElementById("ordersList");

function goPage(page){
  window.location.href = page;
}

function loadOrders(){

let orders = JSON.parse(localStorage.getItem("orders")) || [];

if(orders.length === 0){
ordersList.innerHTML = `
<div class="empty">
<h2>No Orders Yet</h2>
<p>Buy from shop to see your orders here.</p>
</div>
`;
return;
}

renderOrders(orders);
}

function renderOrders(data){

ordersList.innerHTML = "";

data.reverse().forEach(order => {

const image = order.imageUrl
? `http://localhost:5000/uploads/${order.imageUrl}`
: `http://localhost:5000/uploads/shirts.jpg`;

ordersList.innerHTML += `
<div class="order-card">

<div class="order-top">
<div>
<div class="order-id">#${order.orderId}</div>
<div class="order-date">${order.date}</div>
</div>

<div class="status">${order.status || "Paid"}</div>
</div>

<div class="order-body">

<img src="${image}"
onerror="this.src='http://localhost:5000/uploads/shirts.jpg'">

<div class="details">

<div class="product-title">
${order.productTitle || "Purchased Item"}
</div>

<p><strong>Qty:</strong> ${order.qty}</p>
<p><strong>Color:</strong> ${order.color}</p>
<p><strong>Size:</strong> ${order.size}</p>
<p><strong>Total:</strong> $${order.total}</p>
<p><strong>Delivery:</strong> ${order.address}</p>

<div class="progress-wrap">
<div class="progress">
<div class="progress-fill"></div>
</div>
<div class="status">Processing Order</div>
</div>

</div>
</div>

</div>
`;
});
}

function filterOrders(){

const text = document.getElementById("searchInput").value.toLowerCase();

let orders = JSON.parse(localStorage.getItem("orders")) || [];

let filtered = orders.filter(order =>
(order.productTitle || "").toLowerCase().includes(text)
);

renderOrders(filtered);
}

loadOrders();
</script>

</body>
</html>
