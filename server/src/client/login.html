<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TeePlatform Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#111827,#1e3a8a,#0f172a);
  padding:20px;
}

.login-box{
  width:100%;
  max-width:430px;
  background:white;
  border-radius:18px;
  padding:35px 28px;
  box-shadow:0 15px 40px rgba(0,0,0,.18);
}

.logo{
  text-align:center;
  font-size:32px;
  font-weight:bold;
  color:#111827;
  margin-bottom:10px;
}

.sub{
  text-align:center;
  color:#666;
  margin-bottom:28px;
}

.input-group{
  margin-bottom:18px;
}

.input-group label{
  display:block;
  margin-bottom:7px;
  font-size:14px;
  color:#444;
  font-weight:bold;
}

.input-group input{
  width:100%;
  padding:14px;
  border:1px solid #d1d5db;
  border-radius:10px;
  font-size:15px;
}

.input-group input:focus{
  outline:none;
  border-color:#2563eb;
}

.login-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#111827;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:8px;
}

.login-btn:hover{
  background:#000;
}

.bottom-text{
  margin-top:18px;
  text-align:center;
  font-size:14px;
  color:#666;
}

.bottom-text a{
  color:#2563eb;
  text-decoration:none;
  font-weight:bold;
}

.demo{
  margin-top:18px;
  background:#f3f4f6;
  padding:12px;
  border-radius:10px;
  font-size:13px;
  color:#555;
}

@media(max-width:500px){
  .login-box{
    padding:28px 20px;
  }
}
</style>
</head>

<body>

<div class="login-box">

<div class="logo">TeePlatform</div>
<div class="sub">Seller / Buyer Account Login</div>

<form id="loginForm">

<div class="input-group">
<label>Email Address</label>
<input type="email" id="email" placeholder="Enter your email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter password" required>
</div>

<button type="submit" class="login-btn">
Login Now
</button>

</form>

<div class="bottom-text">
No account?
<a href="register.html">Create One</a>
</div>

<div class="demo">
Fast access to dashboard, orders, cart, profile and products.
</div>

</div>

<script>
const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value.trim();

try{

const response = await fetch(
"http://localhost:5000/api/auth/login",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email,password})
});

const data = await response.json();

if(data.success){

localStorage.setItem("token", data.token);
localStorage.setItem("user", JSON.stringify(data.user));

alert("Login successful");

window.location.href = "dashboard.html";

}else{
alert(data.message || "Login failed");
}

}catch(error){

console.log(error);
alert("Server connection error");

}

});
</script>

</body>
</html>
